    <!-- Page-header-start -->
    <section class="page-header-section">
        <div class="text-box container">
            <h2 class="main-heading">聯絡我們</h2>
            <div class="breadcrumbs">
                <ul>
                    <li><a href="index.html">首頁</a></li>
                    <li>聯絡我們</li>

            </div>
        </div>
        <div class="hero-img-overlay">
            <img class="hero-slide-bg" src="inc/assets/images-2/hero-slide-img-contact.webp" alt="廣太塑膠">

            <g><circle fill="none" stroke-width="4" stroke-miterlimit="10" cx="12.551" cy="94.755" r="10.551"/><circle fill="none" stroke-width="4" stroke-miterlimit="10" cx="53.653" cy="94.755" r="10.551"/><circle fill="none" stroke-width="4" stroke-miterlimit="10" cx="94.755" cy="94.755" r="10.551"/></g>

    <!-- Contact-section Start -->
    <section class="contact-detail-section">
        <div class="container">
            <div class="contact-detail-wrapper">
                <div class="wow animate__animated custom-fadeInUp">
                    <h6 class="sub-heading">歡迎與我們聯繫</h6>
                    <h2 class="main-heading">廣太塑膠期待與您展開合作。</h2>
                </div>

                <!-- Contact Cards -->
                <section class="contact-cards-section">
                    <div class="container">
                        <div class="contact-cards-wrapper">
                            <div class="contact-card wow animate__animated custom-fadeInUp" data-wow-delay="0s">
                                <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                                    <path d="M164.9 24.6c-7.7-18.6-28-28.5-47.4-23.2l-88 24C12.1 30.2 0 46 0 64C0 311.4 200.6 512 448 512c18 0 33.8-12.1 38.6-29.5l24-88c5.3-19.4-4.6-39.7-23.2-47.4l-96-40c-16.3-6.8-35.2-2.1-46.3 11.6L304.7 368C234.3 334.7 177.3 277.7 144 207.3L193.3 167c13.7-11.2 18.4-30 11.6-46.3l-40-96z"/>
                                </svg>
                                <div class="contact-text">
                                    <h5 class="title">電話</h5>
                                    <a href="tel:+886426391667" class="link">04-2639-1667</a>
                                </div>
                            </div>
                            <div class="contact-card wow animate__animated custom-fadeInUp" data-wow-delay="0.10s">
                                <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                                    <path d="M48 64C21.5 64 0 85.5 0 112c0 15.1 7.1 29.3 19.2 38.4L236.8 313.6c11.4 8.5 27 8.5 38.4 0L492.8 150.4c12.1-9.1 19.2-23.3 19.2-38.4c0-26.5-21.5-48-48-48H48zM0 176V384c0 35.3 28.7 64 64 64H448c35.3 0 64-28.7 64-64V176L294.4 339.2c-22.8 17.1-54 17.1-76.8 0L0 176z"/>
                                </svg>
                                <div class="contact-text">
                                    <h5 class="title">電子信箱</h5>
                                    <a href="mailto:info@kuangtai.com.tw" class="link">info@kuangtai.com.tw</a>
                                </div>
                            </div>
                            <div class="contact-card wow animate__animated custom-fadeInUp" data-wow-delay="0.20s">
                                <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                                    <path d="M215.7 499.2C267 435 384 279.4 384 192C384 86 298 0 192 0S0 86 0 192c0 87.4 117 243 168.3 307.2c12.3 15.3 35.1 15.3 47.4 0zM192 128a64 64 0 1 1 0 128 64 64 0 1 1 0-128z"/>
                                </svg>
                                <div class="contact-text">
                                    <h5 class="title">地址</h5>
                                    <div class="link">臺中市龍井區忠和里海尾路310巷6號</div>
                                </div>
                            </div>
                            <div class="contact-card wow animate__animated custom-fadeInUp" data-wow-delay="0.30s">
                                <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                                    <path d="M256 0a256 256 0 1 1 0 512A256 256 0 1 1 256 0zM232 120V256c0 8 4 15.5 10.7 20l96 64c11 7.4 25.9 4.5 33.3-6.5s4.5-25.9-6.5-33.3L280 243.2V120c0-13.3-10.7-24-24-24s-24 10.7-24 24z"/>
                                </svg>
                                <div class="contact-text">
                                    <h5 class="title">服務時間</h5>
                                    <div class="link">週一至週五 08:00 – 17:30</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Contact Form -->
                <div class="form-call-wrapper" style="grid-template-columns: 1fr;">
                    <div class="main-contact-form wow animate__animated custom-fadeInUp">
                        <h2 class="main-heading">留下您的需求</h2>
                        <form id="mainContactForm" class="form">
                            <div class="form-block">
                                <div class="form-group">
                                    <input type="text" id="contactName" name="name" placeholder="您的姓名 *" required>
                                </div>
                                <div class="form-group">
                                    <input type="text" id="contactCompany" name="company" placeholder="公司名稱">
                                </div>
                                <div class="form-group">
                                    <input type="email" id="contactEmail" name="email" placeholder="電子信箱 *" required>
                                </div>
                                <div class="form-group">
                                    <input type="tel" id="contactPhone" name="phone" placeholder="聯絡電話 *" required>
                                </div>
                                <div class="form-group">
                                    <input type="text" id="contactSubject" name="subject" placeholder="詢問主旨">
                                </div>
                            </div>
                            <div class="form-group">
                                <textarea id="contactMessage" name="message" placeholder="請描述您的需求或問題（材料、數量、圖面說明等）..." rows="8" required></textarea>
                            </div>
                            <button type="submit" class="submit-btn btn primary">
                                <span class="text-one">送出詢問
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M438.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L338.8 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l306.7 0L233.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"/></svg>
                                </span>
                                <span class="text-two">送出詢問
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M438.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L338.8 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l306.7 0L233.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"/></svg>
                                </span>
                            </button>
                            <div id="mainSuccessMessage" class="success"></div>
                            <div id="errorMessage" style="display: none"></div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
